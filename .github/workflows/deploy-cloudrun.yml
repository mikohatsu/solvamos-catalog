# CI: review → build → (main만) Cloud Run 배포
# 인증: GitHub Variables WIF_PROVIDER + WIF_SERVICE_ACCOUNT (Studio와 동일 값)
#        또는 Secret GCP_SA_KEY 폴백
# 주의: .env의 GOOGLE_APPLICATION_CREDENTIALS JSON은 CI에 넣지 않음 (로컬 ADC용)

name: CI / Deploy Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: catalog-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: project-64269e62-555d-4979-88e
  REGION: asia-northeast3
  AR_REPO: solvamos-img
  SERVICE: solvamos-catalog
  IMAGE_NAME: catalog
  STUDIO_URL: https://solvamos-studio-74094114833.asia-northeast3.run.app
  NODE_VERSION: '22'
  # prisma generate only — not used to connect in CI review/build
  DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

jobs:
  review:
    name: Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci --include=dev
        env:
          NODE_ENV: development
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Typecheck
        run: npm run lint
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: development
      - name: Guard committed secrets
        run: |
          set -euo pipefail
          bad=$(git ls-files | grep -E '(^|/)\.env$|\.pem$|credentials\.json$|github-deploy-key\.json$' || true)
          if [ -n "$bad" ]; then
            echo "::error::Secret-like files must not be committed:"
            echo "$bad"
            exit 1
          fi
          echo "No secret-like tracked files."

  build-test:
    name: Build test
    needs: [review]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci --include=dev
        env:
          NODE_ENV: development
      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NODE_ENV: production
      - name: Assert artifacts
        run: |
          set -euo pipefail
          test -f dist/server.mjs
          test -d dist/client
          echo "Artifacts OK"
          ls -la dist | head -30

  deploy:
    name: Deploy Cloud Run
    needs: [review, build-test]
    if: >
      always() &&
      needs.review.result == 'success' &&
      needs.build-test.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && github.ref == 'refs/heads/main'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Apply optional repo Variables
        run: |
          if [ -n "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "PROJECT_ID=${{ vars.GCP_PROJECT_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.GCP_REGION }}" ]; then
            echo "REGION=${{ vars.GCP_REGION }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.GCP_AR_REPO }}" ]; then
            echo "AR_REPO=${{ vars.GCP_AR_REPO }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.STUDIO_URL }}" ]; then
            echo "STUDIO_URL=${{ vars.STUDIO_URL }}" >> "$GITHUB_ENV"
          fi
          echo "Using PROJECT_ID=${PROJECT_ID} REGION=${REGION} SERVICE=${SERVICE}"

      - name: Short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Require GCP auth config
        run: |
          if [ -z "${{ vars.WIF_PROVIDER }}" ] || [ -z "${{ vars.WIF_SERVICE_ACCOUNT }}" ]; then
            if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
              echo "::error::Set repo Variables WIF_PROVIDER + WIF_SERVICE_ACCOUNT (or Secret GCP_SA_KEY) on THIS repository (${{ github.repository }})."
              echo "Copy the same Variable values from solvamos-studio — do NOT paste .env SA JSON into the workflow."
              exit 1
            fi
            echo "Auth mode: SA key"
          else
            echo "Auth mode: WIF"
            echo "SA: ${{ vars.WIF_SERVICE_ACCOUNT }}"
            echo "Repo: ${{ github.repository }}"
          fi

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        if: ${{ vars.WIF_PROVIDER != '' && vars.WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Authenticate to Google Cloud (SA key fallback)
        id: auth-key
        if: ${{ vars.WIF_PROVIDER == '' || vars.WIF_SERVICE_ACCOUNT == '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token
          access_token_lifetime: 3600s

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Export registry access token
        id: token
        run: |
          set -euo pipefail
          TOKEN="${{ steps.auth.outputs.access_token }}"
          if [ -z "${TOKEN}" ]; then
            TOKEN="${{ steps.auth-key.outputs.access_token }}"
          fi
          if [ -z "${TOKEN}" ]; then
            echo "::error::GCP auth produced no access_token. Check WIF Variables on ${{ github.repository }} and pool attribute.repository binding for solvamos-catalog."
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Docker login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.token.outputs.token }}

      - name: Ensure Artifact Registry repo exists
        run: |
          set -euo pipefail
          if ! gcloud artifacts repositories describe "${AR_REPO}" \
            --location="${REGION}" --project="${PROJECT_ID}" >/dev/null 2>&1; then
            gcloud artifacts repositories create "${AR_REPO}" \
              --repository-format=docker \
              --location="${REGION}" \
              --project="${PROJECT_ID}"
          fi

      - name: Build and push image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          set -euo pipefail
          docker build -t "${IMAGE}:${SHA}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${SHA}"
          docker push "${IMAGE}:latest"
          echo "IMAGE_URI=${IMAGE}:${SHA}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --platform=managed \
            --image="${IMAGE_URI}" \
            --port=8080 \
            --allow-unauthenticated \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=3 \
            --add-cloudsql-instances="${PROJECT_ID}:${REGION}:solvamos-studio-pg" \
            --update-env-vars="NODE_ENV=production,STUDIO_URL=${STUDIO_URL},CATALOG_SOURCES=${STUDIO_URL}"

      - name: Bind PUBLIC_BASE_URL + secrets
        env:
          PROJECT_NUMBER_VAR: ${{ vars.GCP_PROJECT_NUMBER }}
        run: |
          set -euo pipefail
          PROJECT_NUMBER="${PROJECT_NUMBER_VAR:-74094114833}"
          URL="https://${SERVICE}-${PROJECT_NUMBER}.${REGION}.run.app"
          LIVE="$(gcloud run services describe "${SERVICE}" --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.url)' 2>/dev/null || true)"
          if [ -n "${LIVE}" ]; then
            URL="${LIVE}"
          fi

          gcloud run services update "${SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --update-env-vars="PUBLIC_BASE_URL=${URL},STUDIO_URL=${STUDIO_URL},CATALOG_SOURCES=${STUDIO_URL}"

          SECRET_FLAGS=()
          if gcloud secrets describe catalog-admin-secret --project="${PROJECT_ID}" >/dev/null 2>&1; then
            SECRET_FLAGS+=("CATALOG_ADMIN_SECRET=catalog-admin-secret:latest")
          else
            echo "::warning::Secret Manager 'catalog-admin-secret' missing"
          fi
          if gcloud secrets describe database-url --project="${PROJECT_ID}" >/dev/null 2>&1; then
            SECRET_FLAGS+=("DATABASE_URL=database-url:latest")
          else
            echo "::warning::Secret Manager 'database-url' missing — catalog will fall back to ephemeral file store"
          fi
          if [ ${#SECRET_FLAGS[@]} -gt 0 ]; then
            gcloud run services update "${SERVICE}" \
              --project="${PROJECT_ID}" \
              --region="${REGION}" \
              --update-secrets="$(IFS=,; echo "${SECRET_FLAGS[*]}")"
            echo "Bound secrets: ${SECRET_FLAGS[*]}"
          fi

          {
            echo "### Deployed"
            echo "- Service: \`${SERVICE}\`"
            echo "- URL: ${URL}"
            echo "- Image: \`${IMAGE_URI}\`"
            echo "- Studio: ${STUDIO_URL}"
            echo "- DB: CatalogAgent via shared Cloud SQL"
          } >> "$GITHUB_STEP_SUMMARY"
